          <div class="sec-title-text">${sec.title}</div>
          <div style="font-size:12px;opacity:.75">${sec.subtitle}</div>
        </div>
        <div class="sec-count">${answered}/${qs.length} answered</div>
        <div class="chevron${isOpen ? ' rot' : ''}">â–¼</div>
      </div>
    `;

    if (isOpen) {
      html += `<div class="sec-qs" id="secqs_${sec.id}">`;
      if (sec.context) {
        html += `<div class="sec-ctx">ðŸ’¡ <strong>Context for CA:</strong> ${sec.context}</div>`;
      }
      qs.forEach(q => {
        html += renderQuestion(q);
      });
      html += '</div>';
    } else {
      html += `<div class="sec-qs hidden" id="secqs_${sec.id}">`;
      if (sec.context) {
        html += `<div class="sec-ctx">ðŸ’¡ <strong>Context for CA:</strong> ${sec.context}</div>`;
      }
      qs.forEach(q => {
        html += renderQuestion(q);
      });
      html += '</div>';
    }

    block.innerHTML = html;
    container.appendChild(block);
  });
}

function toggleSection(secId) {
  state.openSections[secId] = !state.openSections[secId];
  const qsEl = document.getElementById('secqs_' + secId);
  const secEl = document.getElementById('sec_' + secId);
  const hdr = secEl.querySelector('.sec-hdr');
  const ch = secEl.querySelector('.chevron');
  if (state.openSections[secId]) {
    qsEl.classList.remove('hidden');
    hdr.classList.remove('closed');
    ch.classList.add('rot');
  } else {
    qsEl.classList.add('hidden');
    hdr.classList.add('closed');
    ch.classList.remove('rot');
  }
}

function renderQuestion(q) {
  const ans = state.answers[q.id] || {};
  if (q.type === 'r2') return renderR2Question(q, ans);
  if (q.type === 'open') return renderOpenQuestion(q, ans);
  return renderChoiceQuestion(q, ans);
}

function renderChoiceQuestion(q, ans) {
  const aiName = ROW_NAMES[q.ai] || '';
  let optHtml = '<ul class="opts">';
  q.opts.forEach(opt => {
    const name = ROW_NAMES[opt.r] || ('Row ' + opt.r);
    const isAI = opt.r === q.ai;
    const isSel = ans.selected_row === opt.r;
    optHtml += `
      <li class="opt${isSel ? ' sel' : ''}" onclick="selectOpt('${q.id}', ${opt.r})">
        <input type="radio" name="opt_${q.id}" value="${opt.r}" ${isSel ? 'checked' : ''} onchange="selectOpt('${q.id}', ${opt.r})">
        <span class="opt-rnum">Row ${opt.r}</span>
        <span class="opt-name">${name}</span>
        ${isAI ? '<span class="ai-star">â˜… AI suggests</span>' : ''}
      </li>`;
  });
  // Other option
  const otherSel = ans.selected_row && !q.opts.find(o => o.r === ans.selected_row);
  const otherRow = ans.other_row || '';
  const otherName = ans.other_row_name || (otherRow ? (ROW_NAMES[parseInt(otherRow)] || '') : '');
  optHtml += `
    <li class="opt${otherSel ? ' sel' : ''}">
      <div class="other-row">
        <input type="radio" name="opt_${q.id}" value="other" ${otherSel ? 'checked' : ''} onchange="selectOther('${q.id}')">
        <span style="font-size:13px;color:#4a5568;flex-shrink:0">Other:</span>
        <input class="other-num" type="number" id="otherNum_${q.id}" value="${otherRow}"
          placeholder="Row #" oninput="otherRowInput('${q.id}')" onfocus="selectOther('${q.id}')">
        <input class="other-name-input" type="text" id="otherName_${q.id}" value="${otherName}"
          placeholder="Column name (auto-fills, or type custom)"
          oninput="otherNameInput('${q.id}')" onfocus="selectOther('${q.id}')">
      </div>
    </li>`;
  optHtml += '</ul>';

  const aiPill = `<div class="ai-pill">â˜… AI suggests: Row ${q.ai} â€” ${aiName}</div>`;
  const confHtml = renderConfidence(q.id, ans.confidence);
  const notesHtml = renderNotes(q.id, ans.notes);
  const varHtml = renderVariations(q, ans);
  const exHtml = renderExamples(q.id, q.examples, q.reasoning);

  return `
    <div class="q-card" id="qcard_${q.id}">
      <div class="q-hdr">
        <div class="q-badge">${q.id}</div>
        <div class="q-text">${q.text}</div>
      </div>
      ${aiPill}
      ${optHtml}
      ${confHtml}
      ${notesHtml}
      ${varHtml}
      ${exHtml}
    </div>`;
}

function renderOpenQuestion(q, ans) {
  const confHtml = renderConfidence(q.id, ans.confidence);
  const notesHtml = renderNotes(q.id, ans.notes, "Your answer / rule:");
  return `
    <div class="q-card" id="qcard_${q.id}">
      <div class="q-hdr">
        <div class="q-badge">${q.id}</div>
        <div class="q-text">${q.text}</div>
      </div>
      ${q.ai_text ? `<div class="ai-suggestion-open"><span>â˜… AI suggests:</span> ${q.ai_text}</div>` : ''}
      ${q.context_note ? `<div class="open-note">ðŸ’¬ ${q.context_note}</div>` : ''}
      ${confHtml}
      ${notesHtml}
    </div>`;
}

function renderConfidence(qId, val) {
  return `
    <div class="conf-row">
      <div class="conf-lbl">Confidence:</div>
      <div class="conf-opts">
        ${['certain','usually','depends'].map(c =>
          `<label class="conf-opt">
            <input type="radio" name="conf_${qId}" value="${c}" ${val === c ? 'checked' : ''} onchange="setConf('${qId}','${c}')">
            ${c.charAt(0).toUpperCase()+c.slice(1)}
          </label>`
        ).join('')}
      </div>
    </div>`;
}

function renderNotes(qId, val, label) {
  return `
    <div class="notes-row">
      <label for="notes_${qId}">${label || 'Notes (optional):'}</label>
      <textarea id="notes_${qId}" placeholder="E.g. 'only for manufacturing companies' or 'if section header is Employee Benefits thenâ€¦'"
        oninput="setNotes('${qId}', this.value)">${val || ''}</textarea>
    </div>`;
}

function renderExamples(qId, examples, reasoning) {
  if (!examples || !examples.length) return '';
  const isOpen = state.openExamples[qId];
  const hasRealExamples = examples.some(e => e.co !== 'Example data not available');
  if (!hasRealExamples && !reasoning) return '';

  let exHtml = '';
  examples.forEach(ex => {
    if (ex.co === 'Example data not available') {
      exHtml += `<div class="ex-item"><span style="color:#a0aec0;font-style:italic">ðŸ“„ Example data not available â€” please use your professional judgment.</span></div>`;
    } else {
      exHtml += `
        <div class="ex-item">
          <div class="ex-co">ðŸ“„ ${ex.co} <span style="font-weight:400;color:#718096">(${ex.type}, ${ex.yr})</span></div>
          <div class="ex-detail">"${ex.text}" â€” <span class="ex-amt">${ex.amt}</span></div>
          <div class="ex-detail">Section: ${ex.hdr}</div>
        </div>`;
    }
  });
  if (reasoning) {
    exHtml += `<div class="ex-reasoning"><strong>ðŸ’¡ Why AI chose this:</strong> ${reasoning}</div>`;
  }

  return `
    <button class="ex-toggle" onclick="toggleExamples('${qId}')">
      ${isOpen ? 'â–²' : 'â–¶'} ${isOpen ? 'Hide' : 'Show'} Examples & Reasoning
    </button>
    <div class="ex-body${isOpen ? ' open' : ''}" id="ex_${qId}">${exHtml}</div>`;
}

function toggleExamples(qId) {
  state.openExamples[qId] = !state.openExamples[qId];
  const body = document.getElementById('ex_' + qId);
  const btn = body.previousElementSibling;
  if (state.openExamples[qId]) {
    body.classList.add('open');
    btn.innerHTML = 'â–² Hide Examples & Reasoning';
  } else {
    body.classList.remove('open');
    btn.innerHTML = 'â–¶ Show Examples & Reasoning';
  }
}

// â”€â”€â”€ ANSWER HANDLERS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function selectOpt(qId, row) {
  if (!state.answers[qId]) state.answers[qId] = {};
  state.answers[qId].selected_row = row;
  state.answers[qId].other_row = null;
  // Update UI
  const card = document.getElementById('qcard_' + qId);
  card.querySelectorAll('.opt').forEach(el => {
    const radio = el.querySelector('input[type=radio]');
    if (radio && radio.value != 'other') {
      const isMatch = parseInt(radio.value) === row;
      el.classList.toggle('sel', isMatch);
      radio.checked = isMatch;
    } else if (radio && radio.value === 'other') {
      el.classList.remove('sel');
      radio.checked = false;
    }
  });
  updateProgress();
  updateSectionCount(qId);
  autoSave();
}

function selectOther(qId) {
  if (!state.answers[qId]) state.answers[qId] = {};
  const numEl = document.getElementById('otherNum_' + qId);
  const nameEl = document.getElementById('otherName_' + qId);
  const row = numEl ? parseInt(numEl.value) : null;
  if (row) {
    state.answers[qId].selected_row = row;
    state.answers[qId].other_row = row;
    // Only auto-fill name if user hasn't typed a custom value
    const customName = nameEl ? nameEl.value.trim() : '';
    state.answers[qId].other_row_name = customName || ROW_NAMES[row] || '';
  }
  const card = document.getElementById('qcard_' + qId);
  card.querySelectorAll('.opt').forEach(el => {
    const radio = el.querySelector('input[type=radio]');
    if (radio && radio.value !== 'other') {
      el.classList.remove('sel');
      radio.checked = false;
    } else if (radio && radio.value === 'other') {
      el.classList.add('sel');
      radio.checked = true;
    }
  });
  updateProgress();
  updateSectionCount(qId);
  autoSave();
}

function otherRowInput(qId) {
  const numEl = document.getElementById('otherNum_' + qId);
  const nameEl = document.getElementById('otherName_' + qId);
  const row = parseInt(numEl.value);
  if (nameEl) {
    // Auto-fill name only if the name field is currently empty or was previously auto-filled
    const currentName = nameEl.value.trim();
    const wasAutoFilled = currentName === '' || Object.values(ROW_NAMES).includes(currentName);
    if (wasAutoFilled) {
      if (row && ROW_NAMES[row]) {
        nameEl.value = ROW_NAMES[row];
        nameEl.style.color = '#2d3748';
      } else if (row) {
        nameEl.value = '';
        nameEl.placeholder = 'Row ' + row + ' â€” type column name here';
      } else {
        nameEl.value = '';
        nameEl.placeholder = 'Column name (auto-fills, or type custom)';
      }
    }
  }
  selectOther(qId);
}

function otherNameInput(qId) {
  if (!state.answers[qId]) state.answers[qId] = {};
  const nameEl = document.getElementById('otherName_' + qId);
  state.answers[qId].other_row_name = nameEl ? nameEl.value : '';
  autoSave();
}

function setConf(qId, val) {
  if (!state.answers[qId]) state.answers[qId] = {};
  state.answers[qId].confidence = val;
  updateProgress();
  updateSectionCount(qId);
  autoSave();
}

function setNotes(qId, val) {
  if (!state.answers[qId]) state.answers[qId] = {};
  state.answers[qId].notes = val;
  autoSave();
}

// â”€â”€â”€ PROGRESS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function isAnswered(q) {
  const ans = state.answers[q.id];
  if (q.type === 'r2') return q.skip || !!(ans && ans.ca_answer);
  if (!ans) return false;
  if (q.type === 'open') return !!(ans.notes && ans.notes.trim()) || !!(ans.confidence);
  return ans.selected_row != null;
}

function updateProgress() {
  const total = QUESTIONS.length;
  const answered = QUESTIONS.filter(isAnswered).length;
  document.getElementById('progressText').textContent = `${answered} of ${total} questions answered`;
  document.getElementById('progressPct').textContent = `${Math.round(answered/total*100)}%`;
  document.getElementById('pbarFill').style.width = `${answered/total*100}%`;
}

function updateSectionCount(qId) {
  const q = QUESTIONS.find(x => x.id === qId);
  if (!q) return;
  const secId = q.sec;
  const qs = QUESTIONS.filter(x => x.sec === secId);
  const answered = qs.filter(isAnswered).length;
  const secEl = document.getElementById('sec_' + secId);
  if (secEl) {
    const countEl = secEl.querySelector('.sec-count');
    if (countEl) countEl.textContent = `${answered}/${qs.length} answered`;
  }
}

// â”€â”€â”€ SELECT ALL AI â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function selectAllAI() {
  QUESTIONS.forEach(q => {
    if (q.type === 'r2' && !q.skip && q.ai_row != null) {
      if (!state.answers[q.id]) state.answers[q.id] = {};
      state.answers[q.id].ca_answer = 'ai';
      state.answers[q.id].correct_row = q.ai_row;
    }
    if (q.type === 'choice' && q.ai) {
      if (!state.answers[q.id]) state.answers[q.id] = {};
      state.answers[q.id].selected_row = q.ai;
      state.answers[q.id].other_row = null;
    }
  });
  renderSections();
  updateProgress();
  autoSave();
}

// â”€â”€â”€ EXPORT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function exportAnswers() {
  const caName = document.getElementById('caName').value.trim();
  // Highlight unanswered
  let hasUnanswered = false;
  QUESTIONS.forEach(q => {
    const card = document.getElementById('qcard_' + q.id);
    if (card) {
      if (!isAnswered(q)) {
        card.classList.add('highlight');
        hasUnanswered = true;
      } else {
        card.classList.remove('highlight');
      }
    }
  });

  const actionable = QUESTIONS.filter(q => !q.skip);
  const answered = actionable.filter(isAnswered).length;
  const unanswered = actionable.length - answered;

  const answers = {};
  let gt_correct = 0, ai_correct = 0, both_wrong = 0, gt_bugs = 0;

  QUESTIONS.forEach(q => {
    const ans = state.answers[q.id] || {};
    if (q.type === 'r2') {
      if (q.skip) {
        answers[q.id] = { item: q.item, company: q.company, skip: true,
          note: "Comparison bug — both AI and GT agree. No action needed." };
        return;
      }
      const ca = ans.ca_answer || null;
      let correct_row = null, correct_name = null;
      if (ca === 'gt') { correct_row = q.gt_row; gt_correct++; }
      else if (ca === 'ai') { correct_row = q.ai_row; ai_correct++; }
      else if (ca === 'other') { correct_row = ans.other_row || null; both_wrong++; }
      if (ca && ca !== 'gt') gt_bugs++;
      correct_name = correct_row ? (ans.other_row_name || ROW_NAMES[correct_row] || ('Row ' + correct_row)) : null;
      answers[q.id] = {
        item: q.item, company: q.company,
        gt_row: q.gt_row, gt_name: ROW_NAMES[q.gt_row] || ('Row ' + q.gt_row),
        ai_row: q.ai_row, ai_name: q.ai_row ? (ROW_NAMES[q.ai_row] || ('Row ' + q.ai_row)) : 'DOUBT',
        ca_answer: ca,
        correct_row, correct_name,
        is_gt_bug: ca != null ? ca !== 'gt' : null,
        confidence: ans.confidence || null,
        notes: ans.notes || ''
      };
    }
  });

  const json = {
    round: 2,
    ca_name: caName || '(not specified)',
    date: new Date().toISOString().split('T')[0],
    summary: {
      total_questions: actionable.length,
      answered,
      unanswered,
      gt_was_correct: gt_correct,
      ai_was_correct: ai_correct,
      both_wrong,
      confirmed_gt_bugs: gt_bugs
    },
    answers
  };

  const jsonStr = JSON.stringify(json, null, 2);

  // Show in textarea
  const out = document.getElementById('exportOut');
  out.value = jsonStr;
  out.classList.add('visible');

  // Download
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const dateStr = new Date().toISOString().split('T')[0];
  a.download = `ca_answers_${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  if (hasUnanswered) {
    setTimeout(() => {
      alert(`Export complete!\n\nNote: ${skipped} questions were not answered (highlighted in red). You can continue answering and re-export.`);
    }, 500);
  }
}

function toggleExportView() {
  const out = document.getElementById('exportOut');
  out.classList.toggle('visible');
  if (out.classList.contains('visible') && !out.value) {
    out.value = '(click "Export Answers" first to generate JSON)';
  }
}

// â”€â”€â”€ AUTOSAVE / RESTORE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function autoSave() {
  try {
    const data = {
      caName: document.getElementById('caName').value,
      answers: state.answers,
      savedAt: new Date().toISOString()
    };
    localStorage.setItem('cma_ca_questionnaire', JSON.stringify(data));
  } catch(e) {}
}

function checkRestore() {
  try {
    const raw = localStorage.getItem('cma_ca_questionnaire');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.answers && Object.keys(data.answers).length > 0) {
      const banner = document.getElementById('restoreBanner');
      banner.classList.remove('hidden');
      const d = new Date(data.savedAt);
      banner.querySelector('span') && (banner.querySelector('span').textContent = `Previous session found (saved ${d.toLocaleString()})`);
      banner.firstChild.textContent = `ðŸ’¾ Previous answers found (saved ${d.toLocaleString()}). `;
    }
  } catch(e) {}
}

function restoreAnswers() {
  try {
    const raw = localStorage.getItem('cma_ca_questionnaire');
    if (!raw) return;
    const data = JSON.parse(raw);
    state.answers = data.answers || {};
    document.getElementById('caName').value = data.caName || '';
    document.getElementById('restoreBanner').classList.add('hidden');
    renderSections();
    updateProgress();
  } catch(e) { alert('Could not restore: ' + e.message); }
}

function dismissRestore() {
  localStorage.removeItem('cma_ca_questionnaire');
  document.getElementById('restoreBanner').classList.add('hidden');
}

function clearAll() {
  if (!confirm('Clear all answers? This cannot be undone.')) return;
  state.answers = {};
  localStorage.removeItem('cma_ca_questionnaire');
  document.getElementById('caName').value = '';
  renderSections();
  updateProgress();
}

// â”€â”€â”€ VARIATION BLOCKS (Industry / P&L vs BS) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

// ─── ROUND 2 CARD RENDERER ────────────────────────────────────────────────────
function renderR2Question(q, ans) {
  if (q.skip) {
    return `<div class="r2-skip-card" id="qcard_${q.id}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div class="q-badge" style="background:#a0aec0">${q.id}</div>
        <div style="font-weight:600;color:#718096">${q.item} <span class="r2-co-tag">${q.company||''}</span></div>
      </div>
      <div class="r2-skip-msg">✅ No action needed — both AI and GT say Row ${q.gt_row} (${ROW_NAMES[q.gt_row]||(q.gt_row)}). Comparison bug in test harness.</div>
    </div>`;
  }
  const gtName = ROW_NAMES[q.gt_row] || ('Row '+q.gt_row);
  const aiName = q.ai_row ? (ROW_NAMES[q.ai_row] || ('Row '+q.ai_row)) : null;
  const ca = ans.ca_answer;
  const isGT=ca==='gt', isAI=ca==='ai', isOther=ca==='other';
  const otherRow = ans.other_row || '';
  const otherName = ans.other_row_name || (otherRow ? (ROW_NAMES[parseInt(otherRow)]||'') : '');
  const confHtml = renderConfidence(q.id, ans.confidence);
  const notesHtml = renderNotes(q.id, ans.notes);
  const extraOpts = (q.opts||[]).filter(r => r!==q.gt_row && r!==q.ai_row).map(r => {
    const rn = ROW_NAMES[r] || ('Row '+r);
    const isSel = ca==='other' && ans.correct_row===r && !ans.other_row;
    return `<li class="opt${isSel?' sel':''}" onclick="r2PickRow('${q.id}',${r})">
      <input type="radio" name="r2_${q.id}" value="row_${r}" ${isSel?'checked':''}>
      <span style="font-weight:600;color:#6b46c1">Neither →</span>
      <span style="color:#1a365d;font-weight:700;font-size:12px;min-width:55px;display:inline-block">Row ${r}</span>
      <span style="color:#2d3748">${rn}</span>
    </li>`;
  }).join('');
  return `<div class="q-card${!ca?' highlight':''}" id="qcard_${q.id}">
    <div class="q-hdr">
      <div class="q-badge q-badge-r2">${q.id}</div>
      <div class="q-text">${q.item}<span class="r2-co-tag">${q.company||''}</span></div>
    </div>
    <div class="r2-compare">
      <div class="r2-row r2-gt${isGT?' r2-selected':''}">
        <span class="r2-badge r2-gt-badge">GT</span>
        <span class="r2-row-ref">Row ${q.gt_row}</span>
        <span class="r2-row-name">${gtName}</span>
      </div>
      <div class="r2-row r2-ai${isAI?' r2-selected':''}">
        <span class="r2-badge r2-ai-badge">AI</span>
        ${q.ai_doubt
          ? '<span class="r2-doubt-tag">AI returned DOUBT — could not classify</span>'
          : `<span class="r2-row-ref">Row ${q.ai_row}</span><span class="r2-row-name">${aiName}</span>`
        }
      </div>
    </div>
    <div class="r2-which">Which is correct?</div>
    <ul class="opts">
      <li class="opt${isGT?' sel':''}" onclick="r2Pick('${q.id}','gt')">
        <input type="radio" name="r2_${q.id}" value="gt" ${isGT?'checked':''}>
        <span class="r2-badge-inline r2-gt-badge">GT</span>
        <span style="font-weight:600">GT is correct</span>
        <span style="color:#718096;font-size:12px;margin-left:6px">→ Row ${q.gt_row} — ${gtName}</span>
      </li>
      ${!q.ai_doubt && q.ai_row!=null ? `<li class="opt${isAI?' sel':''}" onclick="r2Pick('${q.id}','ai')">
        <input type="radio" name="r2_${q.id}" value="ai" ${isAI?'checked':''}>
        <span class="r2-badge-inline r2-ai-badge">AI</span>
        <span style="font-weight:600">AI is correct</span>
        <span style="color:#718096;font-size:12px;margin-left:6px">→ Row ${q.ai_row} — ${aiName}</span>
      </li>` : ''}
      ${extraOpts}
      <li class="opt${isOther&&otherRow?' sel':''}">
        <div class="other-row">
          <input type="radio" name="r2_${q.id}" value="other" ${isOther?'checked':''} onchange="r2PickOther('${q.id}')">
          <span style="font-size:13px;color:#e67e22;font-weight:600;flex-shrink:0">Both wrong →</span>
          <input class="other-num" type="number" id="r2Num_${q.id}" value="${otherRow}"
            placeholder="Row #" oninput="r2OtherNum('${q.id}')" onfocus="r2PickOther('${q.id}')">
          <input class="other-name-input" type="text" id="r2Name_${q.id}" value="${otherName}"
            placeholder="Column name (auto-fills or type)" oninput="r2OtherName('${q.id}')" onfocus="r2PickOther('${q.id}')">
        </div>
      </li>
    </ul>
    ${confHtml}${notesHtml}
    ${renderVariations(q, ans)}
    ${q.note ? `<div class="r2-note">💬 ${q.note}</div>` : ''}
  </div>`;
}

function r2Pick(qId, val) {
  const q = QUESTIONS.find(x => x.id === qId);
  if (!state.answers[qId]) state.answers[qId] = {};
  const ans = state.answers[qId];
  ans.ca_answer = val;
  ans.correct_row = val === 'gt' ? q.gt_row : q.ai_row;
  ans.other_row = null; ans.other_row_name = '';
  const card = document.getElementById('qcard_' + qId);
  if (card) {
    card.classList.remove('highlight');
    card.querySelectorAll('.opt').forEach(el => {
      const r = el.querySelector('input[type=radio]');
      if (r) { const m = r.value === val; el.classList.toggle('sel', m); r.checked = m; }
    });
  }
  updateProgress(); updateSectionCount(qId); autoSave();
}

function r2PickRow(qId, row) {
  if (!state.answers[qId]) state.answers[qId] = {};
  const ans = state.answers[qId];
  ans.ca_answer = 'other'; ans.correct_row = row;
  ans.other_row = null; ans.other_row_name = ROW_NAMES[row] || ('Row '+row);
  const card = document.getElementById('qcard_' + qId);
  if (card) {
    card.classList.remove('highlight');
    card.querySelectorAll('.opt').forEach(el => {
      const r = el.querySelector('input[type=radio]');
      if (r) { const m = r.value === ('row_'+row); el.classList.toggle('sel', m); r.checked = m; }
    });
  }
  updateProgress(); updateSectionCount(qId); autoSave();
}

function r2PickOther(qId) {
  if (!state.answers[qId]) state.answers[qId] = {};
  const ans = state.answers[qId];
  const numEl = document.getElementById('r2Num_' + qId);
  const nameEl = document.getElementById('r2Name_' + qId);
  const row = numEl ? parseInt(numEl.value) : null;
  ans.ca_answer = 'other';
  if (row) {
    ans.correct_row = row; ans.other_row = row;
    ans.other_row_name = (nameEl && nameEl.value.trim()) || ROW_NAMES[row] || '';
    if (nameEl && !nameEl.value.trim() && ROW_NAMES[row]) nameEl.value = ROW_NAMES[row];
  }
  const card = document.getElementById('qcard_' + qId);
  if (card) {
    card.classList.remove('highlight');
    card.querySelectorAll('.opt').forEach(el => {
      const r = el.querySelector('input[type=radio]');
      if (r) { const m = r.value === 'other'; el.classList.toggle('sel', m); r.checked = m; }
    });
  }
  updateProgress(); updateSectionCount(qId); autoSave();
}

function r2OtherNum(qId) {
  const numEl = document.getElementById('r2Num_' + qId);
  const nameEl = document.getElementById('r2Name_' + qId);
  const row = parseInt(numEl.value);
  if (nameEl) {
    const cur = nameEl.value.trim();
    const wasAuto = cur === '' || Object.values(ROW_NAMES).includes(cur);
    if (wasAuto) {
      nameEl.value = (row && ROW_NAMES[row]) ? ROW_NAMES[row] : '';
      if (row && !ROW_NAMES[row]) nameEl.placeholder = 'Row '+row+' — type column name';
    }
  }
  r2PickOther(qId);
}

function r2OtherName(qId) {
  if (!state.answers[qId]) state.answers[qId] = {};
  const nameEl = document.getElementById('r2Name_' + qId);
  state.answers[qId].other_row_name = nameEl ? nameEl.value : '';
  autoSave();
}

// ─── VARIATION BLOCKS (Industry / P&L vs BS) ──────────────────────────────────
function ensureVarState(qId) {
  if (!state.answers[qId]) state.answers[qId] = {};
  const ans = state.answers[qId];
  if (!ans.industries) {
    ans.industries = {};
    INDUSTRIES.forEach(i => {
      ans.industries[i.key] = {selected_row:null,other_row:null,other_row_name:'',confidence:null,notes:''};
    });
  }
  if (!ans.contexts) {
    ans.contexts = {};
    CONTEXTS.forEach(c => {
      ans.contexts[c.key] = {selected_row:null,other_row:null,other_row_name:'',confidence:null,notes:''};
    });
  }
  if (ans.var_industry_on === undefined) ans.var_industry_on = false;
  if (ans.var_context_on === undefined) ans.var_context_on = false;
  if (!state.varActiveTab[qId]) state.varActiveTab[qId] = {industry:'manufacturing', context:'pl'};
}

function toggleVarMode(qId, mode) {
  ensureVarState(qId);
  const ans = state.answers[qId];
  if (mode === 'industry') ans.var_industry_on = !ans.var_industry_on;
  else ans.var_context_on = !ans.var_context_on;
  reRenderVar(qId);
  autoSave();
}

function reRenderVar(qId) {
  const varEl = document.getElementById('var_' + qId);
  if (!varEl) return;
  const q = QUESTIONS.find(x => x.id === qId);
  const ans = state.answers[qId] || {};
  const tmp = document.createElement('div');
  tmp.innerHTML = renderVariations(q, ans);
  varEl.replaceWith(tmp.firstChild);
}

function renderVariations(q, ans) {
  if (q.skip) return ''; // No variations for skip cards
  ensureVarState(q.id);
  const indOn = ans.var_industry_on;
  const ctxOn = ans.var_context_on;
  let html = `<div id="var_${q.id}">
    <div class="var-btns">
      <button class="var-btn${indOn?' on':''}" onclick="toggleVarMode('${q.id}','industry')">
        ${indOn ? 'âœ• Remove' : '+'} ðŸ“Š Varies by Industry
      </button>
      <button class="var-btn${ctxOn?' on':''}" onclick="toggleVarMode('${q.id}','context')">
        ${ctxOn ? 'âœ• Remove' : '+'} ðŸ“‹ Varies by P&L / BS context
      </button>
    </div>`;
  if (indOn) html += renderVarBlock(q, ans, 'industry');
  if (ctxOn) html += renderVarBlock(q, ans, 'context');
  html += '</div>';
  return html;
}

function renderVarBlock(q, ans, mode) {
  const items = mode === 'industry' ? INDUSTRIES : CONTEXTS;
  const stateKey = mode === 'industry' ? 'industries' : 'contexts';
  const title = mode === 'industry' ? 'ðŸ“Š Industry-specific Answers' : 'ðŸ“‹ P&L vs Balance Sheet Answers';
  const activeTab = state.varActiveTab[q.id][mode] || items[0].key;

  let html = `<div class="var-block">
    <div class="var-block-hdr">
      <span class="var-block-title">${title}</span>
      <button class="var-remove-btn" onclick="toggleVarMode('${q.id}','${mode}')">âœ• Remove</button>
    </div>
    <div class="var-tabs-bar">`;

  items.forEach(item => {
    const iv = (ans[stateKey] || {})[item.key];
    const hasAns = iv && iv.selected_row != null;
    const isAct = item.key === activeTab;
    html += `<button class="var-tab-btn${isAct?' act':''}"
      onclick="switchVarTab('${q.id}','${mode}','${item.key}')">${item.label}${hasAns?' âœ“':''}</button>`;
  });

  html += `</div>`;

  items.forEach(item => {
    const isAct = item.key === activeTab;
    const itemAns = (ans[stateKey] || {})[item.key] || {};
    html += `<div class="var-tab-body${isAct?' act':''}" id="vartab_${q.id}_${mode}_${item.key}">`;
    html += renderVarMiniOpts(q, mode, item.key, itemAns);
    html += renderVarConf(q.id, mode, item.key, itemAns.confidence);
    html += renderVarNotes(q.id, mode, item.key, itemAns.notes);
    html += `</div>`;
  });

  html += '</div>';
  return html;
}

function renderVarMiniOpts(q, mode, tabKey, itemAns) {
  // Normalise opts: R2 uses plain numbers, choice uses {r:N} objects
  let normOpts;
  if (q.type === 'r2') {
    const allRows = [q.gt_row, ...(q.ai_row && !q.ai_doubt ? [q.ai_row] : []), ...(q.opts||[])];
    const seen = new Set();
    normOpts = allRows.filter(r => r && !seen.has(r) && seen.add(r)).map(r => ({r}));
  } else {
    normOpts = q.opts || [];
  }
  const aiRow = q.type === 'r2' ? q.ai_row  : q.ai;
  const gtRow = q.type === 'r2' ? q.gt_row  : null;
  let html = '<ul class="var-mini-opts">';
  normOpts.forEach(opt => {
    const name  = ROW_NAMES[opt.r] || ('Row ' + opt.r);
    const isAI  = opt.r === aiRow;
    const isGT  = opt.r === gtRow;
    const isSel = itemAns.selected_row === opt.r;
    html += `<li class="var-mini-opt${isSel?' sel':''}" onclick="setVarOpt('${q.id}','${mode}','${tabKey}',${opt.r})">`;
    html += `<input type="radio" name="v_${q.id}_${mode}_${tabKey}" value="${opt.r}" ${isSel?'checked':''}>`;
    html += `<span class="var-mini-rnum">R${opt.r}</span><span class="var-mini-name">${name}</span>`;
    html += isAI ? '<span class="var-mini-aistar">★ AI</span>' : '';
    html += isGT ? '<span style="font-size:10px;color:#c05621;font-weight:700;margin-left:4px">(GT)</span>' : '';
    html += '</li>';
  });
    // Other option
  const otherSel = itemAns.selected_row && !normOpts.find(o => o.r === itemAns.selected_row);
  const otherRow = itemAns.other_row || '';
  const otherName = itemAns.other_row_name || (otherRow ? (ROW_NAMES[parseInt(otherRow)] || '') : '');
  html += `<li class="var-mini-opt${otherSel?' sel':''}">
    <div class="var-other-row">
      <input type="radio" name="v_${q.id}_${mode}_${tabKey}" value="other" ${otherSel?'checked':''}
        onchange="setVarOtherSelect('${q.id}','${mode}','${tabKey}')">
      <span style="font-size:12px;color:#4a5568;flex-shrink:0">Other:</span>
      <input class="var-other-num" type="number" id="vONum_${q.id}_${mode}_${tabKey}" value="${otherRow}"
        placeholder="Row #" oninput="varOtherRowInput('${q.id}','${mode}','${tabKey}')"
        onfocus="setVarOtherSelect('${q.id}','${mode}','${tabKey}')">
      <input class="var-other-name" type="text" id="vOName_${q.id}_${mode}_${tabKey}" value="${otherName}"
        placeholder="Column name (auto-fills or type custom)"
        oninput="varOtherNameInput('${q.id}','${mode}','${tabKey}')"
        onfocus="setVarOtherSelect('${q.id}','${mode}','${tabKey}')">
    </div>
  </li>`;
  html += '</ul>';
  return html;
}

function renderVarConf(qId, mode, tabKey, val) {
  return `<div class="var-conf-row">
    <span class="var-conf-lbl">Confidence:</span>
    ${['certain','usually','depends'].map(c =>
      `<label class="var-conf-opt">
        <input type="radio" name="vc_${qId}_${mode}_${tabKey}" value="${c}" ${val===c?'checked':''}
          onchange="setVarConf('${qId}','${mode}','${tabKey}','${c}')">
        ${c.charAt(0).toUpperCase()+c.slice(1)}
      </label>`
    ).join('')}
  </div>`;
}

function renderVarNotes(qId, mode, tabKey, val) {
  return `<div class="var-notes-row">
    <div class="var-notes-lbl">Notes / conditions:</div>
    <textarea class="var-notes-ta" placeholder="E.g. 'only applies when listed under Direct Expenses section'"
      oninput="setVarNotes('${qId}','${mode}','${tabKey}',this.value)">${val||''}</textarea>
  </div>`;
}

function switchVarTab(qId, mode, tabKey) {
  state.varActiveTab[qId][mode] = tabKey;
  reRenderVar(qId);
}

function getVarItem(qId, mode, tabKey) {
  ensureVarState(qId);
  const stateKey = mode === 'industry' ? 'industries' : 'contexts';
  return state.answers[qId][stateKey][tabKey];
}

function setVarOpt(qId, mode, tabKey, row) {
  const item = getVarItem(qId, mode, tabKey);
  item.selected_row = row;
  item.other_row = null;
  // Update UI directly without full re-render
  const body = document.getElementById(`vartab_${qId}_${mode}_${tabKey}`);
  if (body) {
    body.querySelectorAll('.var-mini-opt').forEach(el => {
      const radio = el.querySelector('input[type=radio]');
      if (!radio) return;
      if (radio.value === 'other') {
        el.classList.remove('sel'); radio.checked = false;
      } else {
        const match = parseInt(radio.value) === row;
        el.classList.toggle('sel', match); radio.checked = match;
      }
    });
  }
  updateVarTabCheckmark(qId, mode, tabKey);
  autoSave();
}

function setVarOtherSelect(qId, mode, tabKey) {
  const numEl = document.getElementById(`vONum_${qId}_${mode}_${tabKey}`);
  const nameEl = document.getElementById(`vOName_${qId}_${mode}_${tabKey}`);
  const row = numEl ? parseInt(numEl.value) : null;
  const item = getVarItem(qId, mode, tabKey);
  if (row) {
    item.selected_row = row;
    item.other_row = row;
    item.other_row_name = (nameEl && nameEl.value.trim()) || ROW_NAMES[row] || '';
  }
  const body = document.getElementById(`vartab_${qId}_${mode}_${tabKey}`);
  if (body) {
    body.querySelectorAll('.var-mini-opt').forEach(el => {
      const radio = el.querySelector('input[type=radio]');
      if (!radio) return;
      if (radio.value === 'other') {
        el.classList.add('sel'); radio.checked = true;
      } else {
        el.classList.remove('sel'); radio.checked = false;
      }
    });
  }
  updateVarTabCheckmark(qId, mode, tabKey);
  autoSave();
}

function varOtherRowInput(qId, mode, tabKey) {
  const numEl = document.getElementById(`vONum_${qId}_${mode}_${tabKey}`);
  const nameEl = document.getElementById(`vOName_${qId}_${mode}_${tabKey}`);
  const row = parseInt(numEl.value);
  if (nameEl) {
    const cur = nameEl.value.trim();
    const wasAuto = cur === '' || Object.values(ROW_NAMES).includes(cur);
    if (wasAuto) {
      nameEl.value = (row && ROW_NAMES[row]) ? ROW_NAMES[row] : '';
      if (row && !ROW_NAMES[row]) nameEl.placeholder = `Row ${row} â€” type column name here`;
    }
  }
  setVarOtherSelect(qId, mode, tabKey);
}

function varOtherNameInput(qId, mode, tabKey) {
  const nameEl = document.getElementById(`vOName_${qId}_${mode}_${tabKey}`);
  getVarItem(qId, mode, tabKey).other_row_name = nameEl ? nameEl.value : '';
  autoSave();
}

function setVarConf(qId, mode, tabKey, val) {
  getVarItem(qId, mode, tabKey).confidence = val;
  autoSave();
}

function setVarNotes(qId, mode, tabKey, val) {
  getVarItem(qId, mode, tabKey).notes = val;
  autoSave();
}

function updateVarTabCheckmark(qId, mode, tabKey) {
  const items = mode === 'industry' ? INDUSTRIES : CONTEXTS;
  const item = items.find(i => i.key === tabKey);
  if (!item) return;
  const varEl = document.getElementById('var_' + qId);
  if (!varEl) return;
  // Find the tab button for this tabKey and update its text
  varEl.querySelectorAll('.var-tab-btn').forEach(btn => {
    const oc = btn.getAttribute('onclick') || '';
    if (oc.includes(`'${tabKey}'`) && oc.includes(`'${mode}'`)) {
      const hasAns = getVarItem(qId, mode, tabKey).selected_row != null;
      btn.textContent = item.label + (hasAns ? ' âœ“' : '');
    }
  });
}
</script>
</body>
</html>
