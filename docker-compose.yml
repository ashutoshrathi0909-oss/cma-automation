services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_cache:/root/.cache
      - ./CMA_Ground_Truth_v1:/app/CMA_Ground_Truth_v1:ro
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    env_file:
      - .env
    environment:
      - WATCHPACK_POLLING=true
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: arq app.workers.worker.WorkerSettings
    volumes:
      - ./backend:/app
      - backend_cache:/root/.cache
      - ./DOCS/CMA.xlsm:/app/DOCS/CMA.xlsm:ro
      - ./DOCS/extractions:/app/DOCS/extractions:ro
      - ./CMA_Ground_Truth_v1:/app/CMA_Ground_Truth_v1:ro
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  backend_cache:
  frontend_node_modules:
  frontend_next:
  redis_data:
